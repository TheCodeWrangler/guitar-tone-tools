<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guitar Tone Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <header>
      <h1><span>Guitar</span> Tone Tools</h1>
      <p>Record, analyze, and compare guitar tones — right in your browser.</p>
    </header>

    <nav>
      <button class="nav-btn active" data-page="analyze">Analyze</button>
      <button class="nav-btn" data-page="compare">Compare</button>
      <button class="nav-btn" data-page="library">Library</button>
    </nav>

    <!-- ─── Analyze ────────────────────────────────────────────── -->
    <section id="page-analyze" class="page active">
      <div class="record-panel">
        <div class="record-controls">
          <button id="btn-record" class="btn primary">Record</button>
          <button id="btn-upload" class="btn">Upload WAV</button>
          <input type="file" id="file-input" accept=".wav,audio/*" class="hidden" />
          <input type="text" id="guitar-name" placeholder="Guitar name (e.g. Martin D-28)" />
          <button id="btn-analyze" class="btn primary hidden">Analyze</button>
        </div>
        <p id="rec-status">Click <strong>Record</strong> to capture a chord, or <strong>Upload</strong> a WAV file.</p>
        <audio id="audio-player" controls class="hidden"></audio>
      </div>
      <div id="analysis-output"></div>
    </section>

    <!-- ─── Compare ────────────────────────────────────────────── -->
    <section id="page-compare" class="page">
      <div id="compare-content"></div>
    </section>

    <!-- ─── Library ────────────────────────────────────────────── -->
    <section id="page-library" class="page">
      <div id="library-content"></div>
    </section>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
