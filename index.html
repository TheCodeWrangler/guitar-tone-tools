<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Guitar Tone Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="app">

    <header>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode">
        <span class="theme-icon theme-icon-dark">🌙</span>
        <span class="theme-icon theme-icon-light">☀️</span>
      </button>
      <div class="logo" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="2" y="22" width="3" height="8" rx="1.5" fill="var(--accent)" opacity="0.6"/>
          <rect x="7" y="16" width="3" height="14" rx="1.5" fill="var(--primary-h)" opacity="0.75"/>
          <rect x="12" y="8" width="3" height="22" rx="1.5" fill="var(--primary)"/>
          <rect x="17" y="4" width="3" height="26" rx="1.5" fill="var(--primary-h)"/>
          <rect x="22" y="10" width="3" height="20" rx="1.5" fill="var(--primary)" opacity="0.9"/>
          <rect x="27" y="17" width="3" height="13" rx="1.5" fill="var(--primary-h)" opacity="0.7"/>
          <rect x="32" y="23" width="3" height="7" rx="1.5" fill="var(--accent)" opacity="0.5"/>
        </svg>
      </div>
      <h1>Guitar Tone Tools</h1>
      <p class="tagline">Record. Analyze. Compare.</p>
    </header>

    <nav>
      <button class="nav-btn active" data-page="profile">Profile</button>
      <button class="nav-btn" data-page="analyze">Quick Analyze</button>
      <button class="nav-btn" data-page="compare">Compare</button>
      <button class="nav-btn" data-page="library">Library</button>
    </nav>

    <!-- ─── Profile Wizard ─────────────────────────────────────── -->
    <section id="page-profile" class="page active">
      <div class="wizard-intro">
        <h2>Build a Guitar Profile</h2>
        <p>Record each open string and 4 chords to get a complete tone evaluation. Takes about 3 minutes.</p>
      </div>
      <div class="wizard-panel">
        <div class="wizard-name-row">
          <input type="text" id="profile-guitar-name" placeholder="Guitar name (e.g. Taylor 814ce)" />
          <button id="btn-start-profile" class="btn primary">Start Profiling</button>
        </div>
      </div>
      <div id="wizard-content" class="hidden"></div>
      <div id="profile-report" class="hidden"></div>
    </section>

    <!-- ─── Analyze ────────────────────────────────────────────── -->
    <section id="page-analyze" class="page">
      <div class="record-panel">
        <div class="record-controls">
          <button id="btn-record" class="btn primary">Record</button>
          <button id="btn-upload" class="btn">Upload WAV</button>
          <input type="file" id="file-input" accept=".wav,audio/*" class="hidden" />
          <input type="text" id="guitar-name" placeholder="Guitar name (e.g. Martin D-28)" />
        </div>
        <div class="record-controls">
          <select id="chord-select">
            <option value="">What are you playing?</option>
            <optgroup label="Open Chords">
              <option value="Open E">Open E</option>
              <option value="Open Em">Open Em</option>
              <option value="Open A">Open A</option>
              <option value="Open Am">Open Am</option>
              <option value="Open D">Open D</option>
              <option value="Open Dm">Open Dm</option>
              <option value="Open G">Open G</option>
              <option value="Open C">Open C</option>
            </optgroup>
            <optgroup label="Single Notes (Open Strings)">
              <option value="Note E2">E2 (6th string)</option>
              <option value="Note A2">A2 (5th string)</option>
              <option value="Note D3">D3 (4th string)</option>
              <option value="Note G3">G3 (3rd string)</option>
              <option value="Note B3">B3 (2nd string)</option>
              <option value="Note E4">E4 (1st string)</option>
            </optgroup>
          </select>
          <button id="btn-analyze" class="btn primary hidden">Save &amp; Score</button>
        </div>
        <p id="rec-status">Click <strong>Record</strong>, then pluck — recording starts and stops automatically.</p>
        <div id="level-meter" class="level-meter hidden"><div class="level-meter-fill"></div><span class="level-meter-label"></span></div>
        <div id="note-detection" class="hidden"></div>
        <audio id="audio-player" controls class="hidden"></audio>
      </div>
      <div id="analysis-output"></div>
    </section>

    <!-- ─── Compare ────────────────────────────────────────────── -->
    <section id="page-compare" class="page">
      <div id="compare-content"></div>
    </section>

    <!-- ─── Library ────────────────────────────────────────────── -->
    <section id="page-library" class="page">
      <div id="library-content"></div>
    </section>

  </div>

  <script>
    (function() {
      var saved = localStorage.getItem('gtt_theme');
      var prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      var theme = saved || prefer;
      document.documentElement.setAttribute('data-theme', theme);
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('theme-toggle');
        if (btn) btn.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('gtt_theme', next);
          var mc = document.querySelector('meta[name="theme-color"]');
          if (mc) mc.content = next === 'light' ? '#f0f2f8' : '#0a0f1e';
        });
      });
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
